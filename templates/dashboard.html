<!doctype html>
<html lang="de">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>BOGY-App Admin Dashboard</title>

		<link rel="stylesheet" href="/static/admin_dashboard.css" />
		<link
			rel="shortcut icon"
			href="/static/favicon.ico"
			type="image/x-icon" />
	</head>
	<body>
		<header>
			<div>
				<img src="/static/logo.png" alt="BOGY Logo" />
				<div>
					<h1>BOGY-App</h1>
					<p>ADMIN DASHBOARD</p>
				</div>
			</div>
			<div style="margin-right: 1rem;">
				<h1 class="evs">Willkommen, {{ username }}!</h1>
			</div>
		</header>
		<main>
			<div>
				<div class="app-head">
					Klassen
					<button id="btn-details-classes">Details</button>
				</div>
				<div class="app-body">
					{% for class in classes %}
					<div
						class="element-card"
						id="class-{{ class.id }}"
						onclick="clickOnClassCard('class-{{ class.id }}')">
						<span>{{ class.name }}</span>
						<span>Schüler: {{ class.student_count }}</span>
					</div>
					{% endfor %}
				</div>
			</div>
		</main>

		<script src="/static/admin_dashboard.js"></script>
	</body>
</html>
