<!doctype html>
<html lang="de">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>BOGY-App Passwörter</title>

		<link rel="stylesheet" href="css/styles.css" />
		<link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />

		<script type="text/javascript">
			(function(c,l,a,r,i,t,y){
			    c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
			    t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
			    y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
			})(window, document, "clarity", "script", "wphp9fcra5");
		</script>
	</head>
	<body>
		<header>
			<img src="resources/logo.png" alt="BOGY-Logo" class="logo" />
			<span class="heading">Passwörter</span>
		</header>
		<main id="page-nonefound">
			<p>Keine Passwörter gefunden.</p>
			<button id="create-pw">Passwort eintragen</button>
		</main>
		<main id="page-foundsome">
			<div id="passwords"></div>
		</main>
		<main id="page-create">
			<h2>Passwort eintragen</h2>
			<label for="service">Plattform:</label>
			<input type="text" id="service" />
			<label for="pw">Passwort:</label>
			<input type="password" id="pw" />
			<label for="key">Verschlüsselungs-Key:</label>
			<input type="password" id="key" />
			<p id="key-note"></p>
			<button id="create-btn">Eintrag speichern</button>
		</main>

		<div id="beta-notice">
			<span class="fat">Beta-Version:</span> Fehler sind möglich.
			Nutzungsaktivitäten werden anonym erfasst, um die App zu verbessern.
			Danke für die Unterstützung!
		</div>

		<script src="js/methods.js"></script>
		<script src="js/pw.js"></script>
	</body>
</html>
