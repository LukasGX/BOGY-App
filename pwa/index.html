<!doctype html>
<html lang="de">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>BOGY-App</title>

		<link rel="stylesheet" href="css/styles.css" />
		<link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />

		<script type="text/javascript">
			(function(c,l,a,r,i,t,y){
			    c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
			    t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
			    y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
			})(window, document, "clarity", "script", "wphp9fcra5");
		</script>
	</head>
	<body>
		<header>
			<img src="resources/logo.png" alt="BOGY-Logo" class="logo" />
			<span class="heading">BOGY-App</span>
		</header>
		<main id="indexmain">
			<button id="btn-activatepush" class="full urgent">
				Push-Benachrichtigungen aktivieren
			</button>
			<h3>Apps</h3>
			<div id="apps">
				<div class="app-wrapper" id="app-tutoring">
					<div class="app" id="app-tutoring-box">N</div>
					Nachhilfe
				</div>
				<div class="app-wrapper" id="app-wlan">
					<div class="app" id="app-wlan-box">W</div>
					WLAN-Voucher
				</div>
				<div class="app-wrapper" id="app-parentnotification">
					<div class="app" id="app-parentnotification-box">E</div>
					Elternbriefe
				</div>
				<div class="app-wrapper" id="app-pw">
					<div class="app" id="app-pw-box">P</div>
					Passwörter
				</div>
			</div>

			<h3>Externe Links</h3>
			<div id="links">
				<div class="app-wrapper" id="link-untis">
					<div class="app">U</div>
					Untis
				</div>
				<div class="app-wrapper" id="link-mathegym">
					<div class="app">M</div>
					Mathegym
				</div>
				<div class="app-wrapper" id="link-bycs">
					<div class="app">B</div>
					ByCS
				</div>
				<div class="app-wrapper" id="link-ms">
					<div class="app app-sm">MS</div>
					Microsoft 365
				</div>
			</div>
		</main>

		<div id="beta-notice">
			<span class="fat">Beta-Version:</span> Fehler sind möglich.
			Nutzungsaktivitäten werden anonym erfasst, um die App zu verbessern.
			Danke für die Unterstützung!
		</div>

		<script src="js/methods.js"></script>
		<script src="js/index.js"></script>
		<script src="js/push.js"></script>
	</body>
</html>
